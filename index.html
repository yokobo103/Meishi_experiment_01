<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Image Targets</title><meta itemprop="name" content="Image Targets"><meta name="twitter:title" content="Image Targets"><meta property="og:title" content="Image Targets"><meta property="og:site_name" content="Image Targets"><meta name="description" content="This project demonstrates how to use Image Targets to anchor virtual content to images in the real world."><meta itemprop="description" content="This project demonstrates how to use Image Targets to anchor virtual content to images in the real world."><meta property="og:description" content="This project demonstrates how to use Image Targets to anchor virtual content to images in the real world."><meta name="twitter:description" content="This project demonstrates how to use Image Targets to anchor virtual content to images in the real world."><script crossorigin="anonymous" src="./external/runtime/runtime.js"></script><script crossorigin="anonymous" src="./external/xr/xr.js" async="true" data-preload-chunks="slam"></script></head>
<body>
  <div id="camera-guide">
    <div class="guide-copy">
      <div class="guide-title">名刺をカメラに映してください</div>
      <div class="guide-sub">少し下から見上げる角度で映すと認識しやすいです</div>
    </div>
    <div class="guide-frame">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
    </div>
  </div>

  <script src="bundle.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
    }

    #camera-guide {
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #camera-guide.hidden {
      display: none;
    }

    #camera-guide::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.18);
    }

    .guide-copy {
      position: absolute;
      top: 8vh;
      left: 50%;
      transform: translateX(-50%);
      width: min(92vw, 520px);
      text-align: center;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0,0,0,0.55);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 0 16px;
      box-sizing: border-box;
    }

    .guide-title {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .guide-sub {
      font-size: 14px;
      line-height: 1.6;
      opacity: 0.96;
    }

    .guide-frame {
      position: relative;
      width: min(82vw, 360px);
      aspect-ratio: 91 / 55;
      border-radius: 18px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.14);
    }

    .corner {
      position: absolute;
      width: 34px;
      height: 34px;
      border-color: #fff;
      border-style: solid;
      border-width: 0;
    }

    .tl {
      top: 0;
      left: 0;
      border-top-width: 4px;
      border-left-width: 4px;
      border-top-left-radius: 14px;
    }

    .tr {
      top: 0;
      right: 0;
      border-top-width: 4px;
      border-right-width: 4px;
      border-top-right-radius: 14px;
    }

    .bl {
      bottom: 0;
      left: 0;
      border-bottom-width: 4px;
      border-left-width: 4px;
      border-bottom-left-radius: 14px;
    }

    .br {
      bottom: 0;
      right: 0;
      border-bottom-width: 4px;
      border-right-width: 4px;
      border-bottom-right-radius: 14px;
    }

    @media (max-width: 480px) {
      .guide-title {
        font-size: 18px;
      }

      .guide-sub {
        font-size: 13px;
      }
    }
  </style>
</body>
</html>
